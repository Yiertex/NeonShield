name: Build Windows installer

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: Build NeonShield installer
    runs-on: windows-latest

    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      DOTNET_NOLOGO: "1"

    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Install .NET 10 SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Show build tools
        shell: pwsh
        run: |
          dotnet --info
          $compiler = @(
            "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe",
            "$env:ProgramFiles\Inno Setup 6\ISCC.exe"
          ) | Where-Object { Test-Path $_ } | Select-Object -First 1

          if (-not $compiler) {
            throw "Inno Setup wurde auf dem GitHub-Windows-Runner nicht gefunden."
          }

          Write-Host "Inno Setup: $compiler"

      - name: Build application and installer
        id: build
        shell: pwsh
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            $version = "${{ github.ref_name }}".TrimStart("v")
          } else {
            [xml]$project = Get-Content -Raw .\src\NeonShield\NeonShield.csproj
            $version = [string]$project.Project.PropertyGroup.Version
          }

          "version=$version" >> $env:GITHUB_OUTPUT
          .\Build-Installer.ps1 -Version $version

      - name: Verify installer
        id: installer
        shell: pwsh
        run: |
          $installer = Get-ChildItem .\release\installer\NeonShield-Setup-*.exe |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1

          if (-not $installer) {
            throw "Die Installer-EXE wurde nicht erzeugt."
          }

          $hash = Get-FileHash $installer.FullName -Algorithm SHA256
          $relativePath = $installer.FullName.Substring($PWD.Path.Length + 1)
          "path=$relativePath" >> $env:GITHUB_OUTPUT
          "name=$($installer.Name)" >> $env:GITHUB_OUTPUT
          "sha256=$($hash.Hash)" >> $env:GITHUB_OUTPUT
          Write-Host "$($installer.Name) - SHA256: $($hash.Hash)"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: NeonShield-Windows-Installer
          path: ${{ steps.installer.outputs.path }}
          if-no-files-found: error
          compression-level: 0

  release:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Download installer artifact
        uses: actions/download-artifact@v8
        with:
          name: NeonShield-Windows-Installer
          path: release-assets

      - name: Verify downloaded installer
        id: installer
        shell: pwsh
        run: |
          $installer = Get-ChildItem .\release-assets\NeonShield-Setup-*.exe |
            Select-Object -First 1

          if (-not $installer) {
            throw "Die Installer-EXE wurde nicht aus dem Build-Artefakt geladen."
          }

          $hash = Get-FileHash $installer.FullName -Algorithm SHA256
          "path=$($installer.FullName)" >> $env:GITHUB_OUTPUT
          "sha256=$($hash.Hash)" >> $env:GITHUB_OUTPUT
          "$($hash.Hash)  $($installer.Name)" |
            Set-Content .\release-assets\SHA256SUMS.txt -Encoding ascii

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v3
        with:
          name: NeonShield ${{ github.ref_name }}
          body: |
            Automatisch erstellter Windows-Installer für NeonShield.

            Die SHA-256-Prüfsumme steht zusätzlich in `SHA256SUMS.txt`.
            Die ClamAV-Engine und Signaturen werden während der Installation
            aus den offiziellen Quellen heruntergeladen.
          files: |
            release-assets/NeonShield-Setup-*.exe
            release-assets/SHA256SUMS.txt
          prerelease: false
          make_latest: true
          fail_on_unmatched_files: true
          overwrite_files: true
